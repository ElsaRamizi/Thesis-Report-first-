spring.application.name=demo
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mindmetrics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REMOVED_SECRET}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
jwt.secret=${JWT_SECRET:yourSuperSecretKeyThatIsAtLeast32CharactersLong}
jwt.expiration=${JWT_EXPIRATION:86400000}
